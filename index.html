<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <title>SkillBridge AI</title>
  <link rel="stylesheet" href="style.css">

  <!-- Tesseract -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="navbar">
  <h2>SkillBridge AI</h2>
  <p>AI Skill Gap Analyzer</p>
</div>

<div class="container">

  <!-- MAIN CARD -->
  <div class="card">

    <!-- 🔥 MODERN TABS -->
    <div class="tab-container">
      <div class="tab-slider" id="tabSlider"></div>
      <button class="tab active" id="fresherTab">Fresher</button>
      <button class="tab" id="experiencedTab">Experienced</button>
    </div>

    <!-- 👇 Fresher Section -->
    <div id="fresherSection" class="section">
  <h2>🟢 Fresher Mode</h2>
    <div id="fresherSection" class="section">
      <h3>Enter Your Skills</h3>
      <input id="skills" placeholder="Python, SQL, Machine Learning">
    </div>

    <!-- 👇 Experienced Section -->
      <div id="experiencedSection" class="section hidden">
  <h2>🔵 Experienced Mode</h2>
    <div id="experiencedSection" class="section hidden">
      <h3>Enter Your Skills</h3>
      <input id="skillsExp" placeholder="Python, React, Node.js">

      <h3>Years of Experience</h3>
      <input type="number" id="experienceYears" placeholder="e.g. 2">

      <h3>Previous Job Role</h3>
      <input type="text" id="jobRole" placeholder="e.g. Frontend Developer">
    </div>

    <!-- Career -->
    <h3>Select Target Career</h3>
    <select id="career">
      <option>Data Scientist</option>
      <option>Web Developer</option>
      <option>AI Engineer</option>
      <option>Cybersecurity Analyst</option>
      <option>Data Analyst</option>
      <option>Frontend Developer</option>
      <option>Backend Developer</option>
      <option>Cloud Engineer</option>
    </select>

    <!-- Resume -->
    <h3>Upload Resume</h3>
    <input type="file" id="resumeUpload" accept="image/*">
    <button onclick="extractSkills()">Extract Skills</button>

    <!-- Soft Skills -->
    <h3>Enter Soft Skills</h3>
    <input id="softSkills" placeholder="Communication, Teamwork, Leadership">

    <!-- Buttons -->
    <div class="btn-group">
      <button onclick="analyze()">Analyze Skill Gap</button>
      <button onclick="recommendCareer()">Recommend Career</button>
      <button onclick="showDashboard()">Progress Dashboard</button>
      <button onclick="suggestCareers()">Suggest Careers</button>
    </div>

  </div>

  <!-- OUTPUT -->
  <div id="output" class="card result-card"></div>

  <!-- CHATBOT -->
  <div class="card">
    <h3>AI Career Chatbot</h3>
    <div id="chatbox" class="chatbox"></div>
    <input id="chatInput" placeholder="Ask about skills, careers..." />
    <button onclick="sendMessage()">Send</button>
  </div>

  <!-- TRENDING -->
  <div class="card">
    <h3>🔥 Trending Skills</h3>
    <ul id="trending"></ul>
  </div>

</div>

<script src="data.js"></script>
<script src="ai.js"></script>
<script src="script.js"></script>
<script src="dashboard.js"></script>

</body>

</body>
</html>
