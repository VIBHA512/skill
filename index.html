<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <title>SkillBridge AI</title>
  <link rel="stylesheet" href="style.css">

  <!-- Tesseract -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="navbar">
  <h2>SkillBridge AI</h2>
  <p>AI Skill Gap Analyzer</p>
</div>

<div class="container">
<div class="flex justify-center mb-6">
  <button id="fresherTab" class="tab-btn active">Fresher</button>
  <button id="experiencedTab" class="tab-btn">Experienced</button>
</div>
  <!-- Fresher Section -->
<div id="fresherSection">
  <input type="text" placeholder="Enter your skills" class="input-box">
</div>

<!-- Experienced Section -->
<div id="experiencedSection" class="hidden">
  <input type="text" placeholder="Enter your skills" class="input-box">
  
  <input type="number" placeholder="Years of Experience" class="input-box mt-3">
  
  <input type="text" placeholder="Previous Job Role" class="input-box mt-3">
</div>
  <!-- MAIN CARD -->
  <div class="card">

    <h3>Select Target Career</h3>
    <select id="career">
      <option>Data Scientist</option>
      <option>Web Developer</option>
      <option>AI Engineer</option>
      <option>Cybersecurity Analyst</option>
      <option>Data Analyst</option>
<option>Frontend Developer</option>
<option>Backend Developer</option>
<option>Cloud Engineer</option>
    </select>

    <h3>Upload Resume</h3>
    <input type="file" id="resumeUpload" accept="image/*">
    <button onclick="extractSkills()">Extract Skills</button>

    <h3>Enter Your Skills</h3>
    <input id="skills" placeholder="Python, SQL, Machine Learning">

    <h3>Enter Soft Skills</h3>
<input id="softSkills" placeholder="Communication, Teamwork, Leadership">

    <div class="btn-group">
      <button onclick="analyze()">Analyze Skill Gap</button>
      <button onclick="recommendCareer()">Recommend Career</button>
      <button onclick="showDashboard()">Progress Dashboard</button>
      <button onclick="suggestCareers()">Suggest Careers</button>
    </div>

  </div>

  <!-- OUTPUT -->
  <div id="output" class="card result-card"></div>

  <!-- 🔥 CHATBOT -->
  <div class="card">
    <h3>AI Career Chatbot</h3>

    <div id="chatbox" class="chatbox"></div>

    <input id="chatInput" placeholder="Ask about skills, careers..." />
    <button onclick="sendMessage()">Send</button>
  </div>

  
  <!-- 📈 TRENDING SKILLS -->
  <div class="card">
    <h3>🔥 Trending Skills</h3>
    <ul id="trending"></ul>
  </div>

</div>

<!-- Scripts -->
<script src="data.js"></script>
<script src="ai.js"></script>
<script src="script.js"></script>
<script src="dashboard.js"></script>


</body>
</html>
